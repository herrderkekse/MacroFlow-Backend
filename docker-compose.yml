services:
  macroflow-sync:
    build: .
    # Or use a pre-built image:
    # image: ghcr.io/herrderkekse/macroflow-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
      # Admin dashboard: published on the host's loopback interface only, so
      # it is reachable solely from the server itself (or an SSH tunnel:
      # `ssh -L 8081:localhost:8081 <server>`, then open http://localhost:8081).
      - "127.0.0.1:8081:8081"
    environment:
      # Provision your device credentials here (or via an .env file / secret).
      USERS: "${USERS:?set USERS, e.g. alice:change-me}"
      # The admin listener is unauthenticated by design; the loopback-only
      # port mapping above is its access control. Unset to disable entirely.
      ADMIN_ADDR: ":8081"
      # Browser origins allowed to call the contact-form endpoint (CORS).
      # Defaults to "*"; pin it to the website origin in production.
      CORS_ORIGINS: "${CORS_ORIGINS:-https://macro-flow.org}"
    volumes:
      - macroflow-data:/data
    healthcheck:
      # The binary is the only thing in the image (no shell/curl), so exec it
      # with a flag that performs a localhost health probe and exits.
      test: ["CMD", "/macroflow-sync", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  macroflow-data:
